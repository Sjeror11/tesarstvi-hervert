<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa fotek | Tesařství Hervert</title>
    <style>
        :root {
            --bg: #f1ebe3;
            --panel: #fffaf4;
            --ink: #2d1d12;
            --muted: #745743;
            --line: rgba(77, 48, 26, 0.14);
            --accent: #8b4513;
            --accent-strong: #6c330d;
            --danger: #9d2f1f;
            --danger-bg: #fff0ec;
            --success-bg: #edf8ef;
            --shadow: 0 18px 50px rgba(45, 29, 18, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(139, 69, 19, 0.14), transparent 30%),
                linear-gradient(180deg, #f6f0e8 0%, #ece3d7 100%);
        }

        .shell {
            width: min(1120px, calc(100vw - 32px));
            margin: 32px auto;
        }

        .hero {
            margin-bottom: 20px;
            padding: 24px 28px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 250, 244, 0.84);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(32px, 6vw, 54px);
            line-height: 0.95;
        }

        .hero p {
            max-width: 720px;
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .panel-inner {
            padding: 24px;
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        .hidden {
            display: none !important;
        }

        .login-card {
            width: min(520px, 100%);
            margin: 0 auto;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        input,
        select,
        button {
            font: inherit;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(77, 48, 26, 0.16);
            border-radius: 14px;
            background: white;
            color: var(--ink);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 20px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        button.secondary {
            background: transparent;
            color: var(--ink);
            border: 1px solid rgba(77, 48, 26, 0.16);
        }

        button.secondary:hover {
            background: rgba(139, 69, 19, 0.08);
        }

        button.danger {
            background: var(--danger);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .toolbar h2,
        .toolbar p {
            margin: 0;
        }

        .toolbar p {
            color: var(--muted);
        }

        .status {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 15px;
        }

        .status.error {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .status.success {
            background: var(--success-bg);
            color: #22613b;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .uploader {
            display: grid;
            grid-template-columns: 1.2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .uploader input[type="file"] {
            padding: 12px;
            background: white;
        }

        .gallery-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0 12px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        .photo-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: white;
        }

        .photo-card img {
            display: block;
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee3d7;
        }

        .photo-card-body {
            padding: 14px;
            display: grid;
            gap: 10px;
        }

        .photo-card small {
            color: var(--muted);
            word-break: break-word;
        }

        .empty {
            padding: 24px;
            border: 1px dashed rgba(77, 48, 26, 0.24);
            border-radius: 18px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 760px) {
            .shell {
                width: min(100vw - 20px, 100%);
                margin: 10px auto 24px;
            }

            .hero,
            .panel-inner {
                padding: 18px;
            }

            .uploader {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <h1>Správa fotek</h1>
            <p>Přihlášení pro klienta. Po přihlášení lze vybírat sekce webu a do každé přidávat nebo mazat fotografie bez zásahu do kódu.</p>
        </section>

        <section id="login-view" class="panel login-card">
            <div class="panel-inner stack">
                <div>
                    <h2>Přihlášení</h2>
                    <p>Zadejte své jméno a heslo pro správu fotek na webu.</p>
                </div>

                <form id="login-form" class="stack">
                    <div class="field">
                        <label for="username">Jméno</label>
                        <input id="username" name="username" type="text" autocomplete="username" required>
                    </div>

                    <div class="field">
                        <label for="password">Heslo</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>

                    <button type="submit">Přihlásit se</button>
                </form>

                <div id="login-status" class="status error hidden"></div>
            </div>
        </section>

        <section id="admin-view" class="panel hidden">
            <div class="panel-inner stack">
                <div class="toolbar">
                    <div>
                        <h2>Galerie podle sekcí</h2>
                        <p id="admin-user"></p>
                    </div>

                    <div class="actions">
                        <button id="refresh-button" class="secondary" type="button">Obnovit</button>
                        <button id="logout-button" class="secondary" type="button">Odhlásit</button>
                    </div>
                </div>

                <div class="field">
                    <label for="service-select">Sekce webu</label>
                    <select id="service-select"></select>
                </div>

                <form id="upload-form" class="uploader">
                    <div class="field">
                        <label for="photo-file">Nová fotka</label>
                        <input id="photo-file" name="file" type="file" accept="image/*" required>
                    </div>

                    <div class="field">
                        <label for="photo-alt">Popisek fotky</label>
                        <input id="photo-alt" name="alt" type="text" placeholder="Např. Pergola v zahradě">
                    </div>

                    <button type="submit">Přidat fotku</button>
                </form>

                <div id="admin-status" class="status success hidden"></div>

                <div class="gallery-meta">
                    <strong id="gallery-title"></strong>
                    <span id="gallery-count"></span>
                </div>

                <div id="gallery-grid" class="gallery-grid"></div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
